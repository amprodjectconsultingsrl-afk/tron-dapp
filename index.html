<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TronLink Mobile DApp</title>
    <script src="https://cdn.jsdelivr.net"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com">
    <style>
        :root { 
            --tron-red: #eb5757; 
            --bg-page: #f5f5f7; 
            --bg-card: #ffffff;
            --text-main: #1d1d1f;
            --text-sub: #86868b;
            --icon-bg: #f0f0f2;
        }

        [data-theme="dark"] {
            --bg-page: #000000;
            --bg-card: #1c1c1e;
            --text-main: #ffffff;
            --text-sub: #8e8e93;
            --icon-bg: #2c2c2e;
        }

        body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #333; display: flex; justify-content: center; transition: 0.3s; }
        
        /* Container Mobile */
        .app-container { width: 100%; max-width: 414px; height: 100vh; background: var(--bg-page); display: flex; flex-direction: column; overflow: hidden; position: relative; transition: 0.3s; }

        /* Header con Toggle Tema */
        .header { padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; background: var(--bg-card); }
        .theme-toggle { cursor: pointer; font-size: 18px; color: var(--tron-red); }

        /* Card Rossa HD Wallet (Stile Extension) */
        .wallet-card { background: var(--tron-red); margin: 15px; border-radius: 15px; padding: 20px; color: white; box-shadow: 0 8px 20px rgba(235, 87, 87, 0.3); }
        .balance-row { font-size: 34px; font-weight: 700; margin: 10px 0; }
        .addr-row { font-size: 11px; opacity: 0.8; font-family: monospace; display: flex; align-items: center; gap: 8px; }

        /* Risorse (Energy/Bandwidth) */
        .resource-grid { display: flex; gap: 15px; margin-top: 20px; }
        .res-box { flex: 1; font-size: 10px; }
        .progress-bg { height: 4px; background: rgba(255,255,255,0.3); border-radius: 2px; margin-top: 5px; }
        .progress-fill { height: 100%; border-radius: 2px; }

        /* Action Buttons */
        .actions-bar { display: flex; justify-content: space-around; padding: 10px 0 25px; text-align: center; }
        .action-btn { display: flex; flex-direction: column; align-items: center; gap: 8px; cursor: pointer; color: var(--text-main); }
        .icon-circle { width: 50px; height: 50px; background: var(--icon-bg); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; transition: 0.3s; }
        .action-btn span { font-size: 12px; font-weight: 500; }

        /* Asset List */
        .asset-list { flex: 1; background: var(--bg-card); border-radius: 30px 30px 0 0; padding: 25px 20px; transition: 0.3s; }
        .asset-tabs { display: flex; gap: 25px; margin-bottom: 20px; border-bottom: 1px solid var(--icon-bg); padding-bottom: 10px; }
        .tab { font-weight: 700; color: var(--text-sub); font-size: 16px; cursor: pointer; }
        .tab.active { color: var(--text-main); position: relative; }
        .tab.active::after { content:''; position: absolute; bottom: -12px; left: 0; width: 100%; height: 3px; background: var(--tron-red); }

        .token-item { display: flex; justify-content: space-between; align-items: center; padding: 15px 0; border-bottom: 0.5px solid var(--icon-bg); }
        .t-left { display: flex; align-items: center; gap: 15px; }
        .t-icon { width: 44px; height: 44px; border-radius: 50%; }
        .t-name { font-weight: 700; color: var(--text-main); }
        .t-price { font-size: 12px; color: #32d74b; margin-top: 2px; }
        .t-right { text-align: right; }
        .t-bal { font-weight: 700; color: var(--text-main); font-size: 16px; }
        .t-usd { font-size: 12px; color: var(--text-sub); margin-top: 2px; }
    </style>
</head>
<body data-theme="light">

<div class="app-container">
    <div class="header">
        <div style="font-weight: 800; color: var(--text-main);">TronLink Pro</div>
        <div class="theme-toggle" onclick="toggleTheme()"><i class="fas fa-moon"></i></div>
    </div>

    <div class="wallet-card">
        <div style="font-size: 12px; opacity: 0.9;">Total Assets (USD)</div>
        <div class="balance-row">$ <span id="total-val">0.00</span></div>
        <div class="addr-row" id="wallet-addr">Connetti Wallet... <i class="far fa-copy"></i></div>

        <div class="resource-grid">
            <div class="res-box">Energy 0/0 <div class="progress-bg"><div class="progress-fill" style="width:0%; background:#ffcc00;"></div></div></div>
            <div class="res-box">Bandwidth 600/600 <div class="progress-bg"><div class="progress-fill" style="width:100%; background:#2ed573;"></div></div></div>
        </div>
    </div>

    <div class="actions-bar">
        <div class="action-btn"><div class="icon-circle"><i class="fas fa-arrow-up"></i></div><span>Send</span></div>
        <div class="action-btn"><div class="icon-circle"><i class="fas fa-arrow-down"></i></div><span>Receive</span></div>
        <div class="action-btn"><div class="icon-circle"><i class="fas fa-sync"></i></div><span>Swap</span></div>
        <div class="action-btn"><div class="icon-circle"><i class="fas fa-layer-group"></i></div><span>Stake</span></div>
    </div>

    <div class="asset-list">
        <div class="asset-tabs">
            <div class="tab active">Assets</div>
            <div class="tab">Collectibles</div>
        </div>

        <!-- Tether USDT (Il Tuo Token) -->
        <div class="token-item">
            <div class="t-left">
                <img src="https://coin.top" class="t-icon">
                <div><div class="t-name">Tether USDT</div><div class="t-price">$0.9998</div></div>
            </div>
            <div class="t-right">
                <div id="usdt-bal" class="t-bal">0.00</div>
                <div id="usdt-usd" class="t-usd">$ 0.00</div>
            </div>
        </div>

        <!-- TRX -->
        <div class="token-item">
            <div class="t-left">
                <img src="https://coin.top" class="t-icon">
                <div><div class="t-name">TRX</div><div class="t-price">$0.282</div></div>
            </div>
            <div class="t-right">
                <div id="trx-bal" class="t-bal">0.00</div>
            </div>
        </div>
    </div>
</div>

<script>
    const TOKEN_ADDR = "TJ2YrqZpUaTpgirM5chX6S2VhA1imMfrMR";

    function toggleTheme() {
        const body = document.body;
        const icon = document.querySelector('.theme-toggle i');
        if(body.getAttribute('data-theme') === 'light') {
            body.setAttribute('data-theme', 'dark');
            icon.className = 'fas fa-sun';
        } else {
            body.setAttribute('data-theme', 'light');
            icon.className = 'fas fa-moon';
        }
    }

    async function sync() {
        if (window.tronWeb && window.tronWeb.defaultAddress.base58) {
            const addr = window.tronWeb.defaultAddress.base58;
            document.getElementById('wallet-addr').innerText = addr.substring(0,8) + "..." + addr.substring(addr.length-8);
            try {
                let trx = await window.tronWeb.trx.getBalance(addr);
                document.getElementById('trx-bal').innerText = (trx / 1000000).toLocaleString();

                let contract = await window.tronWeb.contract().at(TOKEN_ADDR);
                let bal = await contract.balanceOf(addr).call();
                let cleanBal = Number(bal) / 1000000;
                
                document.getElementById('usdt-bal').innerText = cleanBal.toLocaleString();
                let val = cleanBal * 0.9998;
                document.getElementById('usdt-usd').innerText = "$ " + val.toLocaleString();
                document.getElementById('total-val').innerText = val.toLocaleString(undefined, {minimumFractionDigits:2});
            } catch(e) {}
        }
    }
    setInterval(sync, 3000);
</script>
</body>
</html>
