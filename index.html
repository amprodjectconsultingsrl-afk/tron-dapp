<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TronLink DApp Pro</title>
    <script src="https://cdn.jsdelivr.net"></script>
    <style>
        :root { --tron-red: #eb5757; --text-black: #333; --bg-gray: #f7f8f9; }
        body { margin: 0; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; background: #1a1a1a; display: flex; justify-content: center; }
        .app { width: 375px; height: 667px; background: white; display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 0 50px rgba(0,0,0,0.8); position: relative; }
        
        /* Header */
        .header { padding: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; font-weight: 700; color: var(--text-black); }
        .btn-conn { background: var(--tron-red); color: white; border: none; padding: 5px 12px; border-radius: 20px; font-size: 11px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-conn:hover { background: #d44b4b; }

        /* Card Rossa HD (Stile Originale) */
        .card { background: var(--tron-red); margin: 12px; border-radius: 12px; padding: 20px; color: white; box-shadow: 0 10px 25px rgba(235, 87, 87, 0.4); }
        .card-header { display: flex; justify-content: space-between; align-items: center; font-size: 11px; font-weight: 600; }
        .network-label { background: rgba(255,255,255,0.25); padding: 3px 10px; border-radius: 12px; font-size: 10px; border: 0.5px solid rgba(255,255,255,0.3); }
        .balance-container { margin: 15px 0; }
        .card-label { font-size: 12px; opacity: 0.85; margin-bottom: 8px; }
        .card-balance { font-size: 32px; font-weight: 800; white-space: nowrap; }
        .card-addr { font-size: 11px; background: rgba(0,0,0,0.12); padding: 10px; border-radius: 10px; font-family: 'Courier New', Courier, monospace; display: flex; justify-content: space-between; align-items: center; margin-top: 15px; }

        /* Icone Azioni (SVG Originali) */
        .actions { display: flex; justify-content: space-around; padding: 25px 10px; border-bottom: 10px solid #f5f5f5; }
        .act { display: flex; flex-direction: column; align-items: center; gap: 10px; font-size: 11px; font-weight: 600; color: #555; flex: 1; cursor: pointer; }
        .act-icon { width: 50px; height: 50px; background: #f0f2f5; border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .act-icon svg { width: 24px; height: 24px; fill: #444; }

        /* Assets Section */
        .asset-title { padding: 15px 20px; font-weight: 800; font-size: 18px; color: #333; }
        .row { display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; border-bottom: 1px solid #f9f9f9; }
        .row-left { display: flex; align-items: center; gap: 14px; }
        .logo-box { width: 42px; height: 42px; display: flex; align-items: center; justify-content: center; }
        .logo-box img { width: 100%; height: 100%; object-fit: contain; }
        .t-name { font-weight: 700; font-size: 15px; color: #333; }
        .t-price { font-size: 12px; color: #27ae60; font-weight: 500; margin-top: 2px; }
        .t-right { text-align: right; }
        .t-bal { font-weight: 700; font-size: 16px; color: #333; }
        .t-usd { font-size: 12px; color: #999; margin-top: 2px; }
    </style>
</head>
<body>

<div class="app">
    <div class="header">
        <span>TronLink Pro</span>
        <button class="btn-conn" id="c-btn" onclick="conn()">Connect Wallet</button>
    </div>

    <div class="card">
        <div class="card-header">
            <span>HD Wallet <small>▼</small></span>
            <span class="network-label">Tron Mainnet</span>
        </div>
        <div class="balance-container">
            <div class="card-label">Total Assets (USD)</div>
            <div class="card-balance">$ <span id="total">0.00</span></div>
        </div>
        <div class="card-addr" id="addr">Wallet non connesso <span style="cursor:pointer">📄</span></div>
    </div>

    <div class="actions">
        <!-- Invia -->
        <div class="act"><div class="act-icon"><svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path></svg></div><span>Send</span></div>
        <!-- Ricevi -->
        <div class="act"><div class="act-icon"><svg viewBox="0 0 24 24"><path d="M20 12l-1.41-1.41L13 16.17V4h-2v12.17l-5.58-5.59L4 12l8 8 8-8z"></path></svg></div><span>Receive</span></div>
        <!-- Swap -->
        <div class="act"><div class="act-icon"><svg viewBox="0 0 24 24"><path d="M16 17.01V10h-2v7.01h-3L15 21l4-3.99h-3zM9 3L5 6.99h3V14h2V6.99h3L9 3z"></path></svg></div><span>Swap</span></div>
        <!-- Stake -->
        <div class="act"><div class="act-icon"><svg viewBox="0 0 24 24"><path d="M12 2L4.5 20.29l.71.71L12 18l6.79 3 .71-.71z"></path></svg></div><span>Stake</span></div>
    </div>

    <div class="asset-title">Assets</div>

    <!-- USDT con Logo Originale -->
    <div class="row">
        <div class="row-left">
            <div class="logo-box">
                <img src="https://static.tronscan.org" alt="USDT">
            </div>
            <div><div class="t-name">Tether USDT</div><div class="t-price">$0.9998</div></div>
        </div>
        <div class="t-right"><div class="t-bal" id="u-bal">0.00</div><div class="t-usd" id="u-usd">$ 0.00</div></div>
    </div>

    <!-- TRX con Logo Originale -->
    <div class="row">
        <div class="row-left">
            <div class="logo-box">
                <img src="https://static.tronscan.org" alt="TRX">
            </div>
            <div><div class="t-name">TRX</div><div class="t-price">$0.282</div></div>
        </div>
        <div class="t-right"><div class="t-bal" id="t-bal">0.00</div></div>
    </div>
</div>

<script>
    const TOKEN = "TJ2YrqZpUaTpgirM5chX6S2VhA1imMfrMR";
    async function conn() { if(window.tronWeb) { await window.tronLink.request({method:'tron_requestAccounts'}); sync(); } }
    async function sync() {
        if(window.tronWeb && window.tronWeb.defaultAddress.base58) {
            const a = window.tronWeb.defaultAddress.base58;
            document.getElementById('addr').innerText = a.substring(0,12) + "... 📄";
            document.getElementById('c-btn').style.display = 'none';
            try {
                let trx = await window.tronWeb.trx.getBalance(a);
                document.getElementById('t-bal').innerText = (trx/1000000).toLocaleString('it-IT');
                let c = await window.tronWeb.contract().at(TOKEN);
                let b = await c.balanceOf(a).call();
                let val = Number(b)/1000000;
                document.getElementById('u-bal').innerText = val.toLocaleString('it-IT');
                document.getElementById('u-usd').innerText = "$ " + (val*0.9998).toLocaleString('it-IT');
                document.getElementById('total').innerText = (val*0.9998).toLocaleString('it-IT', {minimumFractionDigits:2});
            } catch(e) {}
        }
    }
    setInterval(sync, 3000);
</script>
</body>
</html>
