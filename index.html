<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Token Dashboard - TRC20</title>
    <script src="https://cdn.jsdelivr.net"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #0f0f0f; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .wallet-card { background: #1a1a1a; border-radius: 20px; padding: 30px; width: 380px; border: 1px solid #ff0013; box-shadow: 0 0 20px rgba(255, 0, 19, 0.2); }
        .logo { color: #ff0013; font-weight: bold; font-size: 22px; text-align: center; margin-bottom: 25px; letter-spacing: 1px; }
        .label { color: #666; font-size: 12px; text-transform: uppercase; margin-top: 15px; }
        .value { font-size: 28px; font-weight: bold; margin: 5px 0; color: #fff; }
        .price-tag { font-size: 14px; color: #00ff88; background: rgba(0,255,136,0.1); padding: 4px 8px; border-radius: 5px; display: inline-block; }
        .address-box { font-size: 11px; background: #111; padding: 10px; border-radius: 10px; word-break: break-all; color: #888; border: 1px solid #333; margin-top: 5px; }
        .btn-group { display: flex; gap: 12px; margin-top: 30px; }
        button { flex: 1; padding: 15px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; transition: 0.3s; font-size: 14px; }
        .btn-send { background: #ff0013; color: white; }
        .btn-receive { background: #333; color: white; }
        button:hover { opacity: 0.9; transform: scale(1.02); }
        #status { font-size: 11px; text-align: center; margin-top: 20px; color: #ff0013; }
    </style>
</head>
<body>

<div class="wallet-card">
    <div class="logo">TRON ASSET MANAGER</div>
    
    <div class="label">Il tuo Indirizzo</div>
    <div id="wallet-address" class="address-box">Connetti TronLink...</div>

    <div class="label">Bilancio Token</div>
    <div id="token-balance" class="value">0.00</div>
    <div id="token-price" class="price-tag">Prezzo: Loading...</div>

    <div class="btn-group">
        <button class="btn-send" onclick="sendToken()">INVIA</button>
        <button class="btn-receive" onclick="copyAddress()">RICEVI</button>
    </div>

    <div id="status">Verifica estensione in corso...</div>
</div>

<script>
    const TOKEN_ADDRESS = "TJ2YrqZpUaTpgirM5chX6S2VhA1imMfrMR";
    
    async function loadData() {
        if (window.tronWeb && window.tronWeb.defaultAddress.base58) {
            const userAddress = window.tronWeb.defaultAddress.base58;
            document.getElementById('wallet-address').innerText = userAddress;
            document.getElementById('status').innerText = "Wallet Sincronizzato";
            document.getElementById('status').style.color = "#00ff88";

            try {
                // 1. Ottieni il contratto del Token
                let contract = await window.tronWeb.contract().at(TOKEN_ADDRESS);
                
                // 2. Leggi il bilancio (considerando i decimali, solitamente 6 o 18)
                let balance = await contract.balanceOf(userAddress).call();
                let decimals = await contract.decimals().call();
                let finalBalance = balance / Math.pow(10, decimals);
                document.getElementById('token-balance').innerText = finalBalance.toLocaleString() + " TOKEN";

                // 3. Simula Prezzo da SUN.io (Opzione A)
                // Nota: Per il prezzo reale serve l'indirizzo della pool. 
                // Impostiamo il tuo valore target come base.
                document.getElementById('token-price').innerText = "Prezzo: $0.9998";

            } catch (error) {
                console.error(error);
                document.getElementById('status').innerText = "Errore nel caricamento dati.";
            }
        }
    }

    function copyAddress() {
        const addr = document.getElementById('wallet-address').innerText;
        navigator.clipboard.writeText(addr);
        alert("Indirizzo copiato!");
    }

    async function sendToken() {
        alert("Funzione di invio: Reindirizzamento alla firma della transazione...");
        // Qui inseriremo la logica di trasferimento nel prossimo step
    }

    setInterval(loadData, 3000); // Aggiorna ogni 3 secondi
</script>

</body>
</html>
