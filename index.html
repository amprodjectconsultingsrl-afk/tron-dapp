<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TronLink Clone Pro</title>
    <script src="https://cdn.jsdelivr.net"></script>
    <style>
        :root { --tron-red: #eb5757; --text-main: #333; --bg-gray: #f9f9f9; }
        body { margin: 0; font-family: 'Segoe UI', Arial, sans-serif; background: #222; display: flex; justify-content: center; }
        .app { width: 375px; height: 667px; background: white; display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 0 30px rgba(0,0,0,0.5); }
        
        /* Header identico all'immagine */
        .top-bar { padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; font-size: 13px; font-weight: bold; }
        .top-left { display: flex; align-items: center; gap: 5px; color: var(--tron-red); }

        /* Card Rossa HD Wallet */
        .wallet-card { background: var(--tron-red); margin: 10px; border-radius: 12px; padding: 18px; color: white; }
        .hd-header { display: flex; justify-content: space-between; font-size: 12px; font-weight: 600; }
        .balance-main { font-size: 32px; font-weight: bold; margin: 15px 0; }
        .addr-row { font-size: 11px; opacity: 0.9; font-family: monospace; display: flex; align-items: center; gap: 5px; }

        /* Energy & Bandwidth (Barre colorate) */
        .resources { display: flex; gap: 15px; margin-top: 20px; background: rgba(0,0,0,0.15); border-radius: 8px; padding: 10px; }
        .res-item { flex: 1; font-size: 11px; }
        .res-bar { height: 4px; background: rgba(255,255,255,0.2); border-radius: 2px; margin-top: 5px; }
        .res-fill { height: 100%; border-radius: 2px; }

        /* Icone Azioni (SVG integrate) */
        .actions { display: flex; justify-content: space-around; padding: 25px 10px; text-align: center; border-bottom: 8px solid #f5f5f5; }
        .act { display: flex; flex-direction: column; align-items: center; gap: 8px; cursor: pointer; color: #666; font-size: 12px; }
        .icon-bg { width: 48px; height: 48px; background: #f0f2f5; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
        .icon-bg svg { width: 24px; height: 24px; fill: #444; }

        /* Asset List */
        .asset-tabs { padding: 15px; display: flex; gap: 20px; font-weight: bold; color: #999; font-size: 16px; }
        .asset-tabs .active { color: #333; position: relative; }
        .asset-tabs .active::after { content: ''; position: absolute; bottom: -5px; left: 0; width: 100%; height: 3px; background: var(--tron-red); }

        .token-row { display: flex; justify-content: space-between; align-items: center; padding: 15px; border-bottom: 1px solid #f9f9f9; }
        .t-info { display: flex; align-items: center; gap: 12px; }
        .t-icon { width: 36px; height: 36px; }
        .t-name { font-weight: bold; font-size: 15px; }
        .t-sub { font-size: 12px; color: #999; margin-top: 2px; }
        .t-right { text-align: right; }
        .t-bal { font-weight: bold; font-size: 15px; }
        .t-usd { font-size: 12px; color: #999; margin-top: 2px; }

        #btn-connect { position: fixed; top: 10px; right: 10px; background: #333; color: white; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer; z-index: 100; }
    </style>
</head>
<body>

<button id="btn-connect" onclick="connect()">Connect Wallet</button>

<div class="app">
    <div class="top-bar">
        <div class="top-left">
            <svg viewBox="0 0 100 100" width="18"><path d="M50 5L5 30l45 65 45-65z" fill="currentColor""")/>></svg> TRON
        </div>
        <div>TRON Mainnet <small>▼</small></div>
        <div style="font-size:18px">☰</div>
    </div>

    <div class="wallet-card">
        <div class="hd-header"><span><small>HD</small> Wallet ▼</span> <span style="background:white; color:var(--tron-red); padding:2px 8px; border-radius:10px; font-size:10px">Use GasFree Wallet →</span></div>
        <div class="balance-main">$ <span id="total-val">0.00</span> <small style="font-size:14px; opacity:0.7">👁</small></div>
        <div class="addr-row" id="addr-ui">Connecting... 📄</div>
        
        <div class="resources">
            <div class="res-item">Energy 0/0 <div class="res-bar"><div class="res-fill" style="width:0%; background:#f39c12;"></div></div></div>
            <div class="res-item">Bandwidth 600/600 <div class="res-bar"><div class="res-fill" style="width:100%; background:#27ae60;"></div></div></div>
        </div>
    </div>

    <div class="actions">
        <div class="act"><div class="icon-bg"><svg viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7""")/>></svg></div><span>Send</span></div>
        <div class="act"><div class="icon-bg"><svg viewBox="0 0 24 24"><path d="M19 12H5M12 19l-7-7 7-7""")/>></svg></div><span>Receive</span></div>
        <div class="act"><div class="icon-bg"><svg viewBox="0 0 24 24"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm-1 6h2v2h-2V7zm0 4h2v6h-2v-6z""")/>></svg></div><span>Stake</span></div>
        <div class="act"><div class="icon-bg"><svg viewBox="0 0 24 24"><path d="M12 8c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zm0 2c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm0 6c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2z""")/>></svg></div><span>More</span></div>
    </div>

    <div class="asset-tabs"><div class="active">Assets</div><div>Collectibles</div></div>

    <!-- TRX -->
    <div class="token-row">
        <div class="t-info">
            <svg class="t-icon" viewBox="0 0 100 100"><circle cx="50" cy="50" r="45" fill="#eb5757""")/>><path d="M50 20L25 40l25 40 25-40z" fill="white""")/>></svg>
            <div><div class="t-name">TRX</div><div class="t-sub">$0.282265</div></div>
        </div>
        <div class="t-right"><div class="t-bal" id="trx-bal">0.00</div><div class="t-usd" id="trx-usd">$0.00</div></div>
    </div>

    <!-- USDT (Il Tuo Token) -->
    <div class="token-row">
        <div class="t-info">
            <svg class="t-icon" viewBox="0 0 100 100"><circle cx="50" cy="50" r="45" fill="#26a17b""")/>><text x="50" y="65" font-size="40" text-anchor="middle" fill="white" font-weight="bold">T</text></svg>
            <div><div class="t-name">Tether USDT</div><div class="t-sub">$0.999875</div></div>
        </div>
        <div class="t-right"><div class="t-bal" id="usdt-bal">0.00</div><div class="t-usd" id="usdt-usd">$0.00</div></div>
    </div>
</div>

<script>
    const TOKEN_ADDR = "TJ2YrqZpUaTpgirM5chX6S2VhA1imMfrMR";
    async function connect() { if (window.tronWeb) { await window.tronLink.request({ method: 'tron_requestAccounts' }); sync(); } }
    async function sync() {
        if (window.tronWeb && window.tronWeb.defaultAddress.base58) {
            const addr = window.tronWeb.defaultAddress.base58;
            document.getElementById('addr-ui').innerText = addr.substring(0,12) + "...";
            try {
                let trx = await window.tronWeb.trx.getBalance(addr);
                let cleanTrx = trx / 1000000;
                document.getElementById('trx-bal').innerText = cleanTrx.toLocaleString();
                
                let contract = await window.tronWeb.contract().at(TOKEN_ADDR);
                let bal = await contract.balanceOf(addr).call();
                let cleanBal = Number(bal) / 1000000;
                document.getElementById('usdt-bal').innerText = cleanBal.toLocaleString();
                
                let total = (cleanBal * 0.999) + (cleanTrx * 0.28);
                document.getElementById('total-val').innerText = total.toLocaleString(undefined, {minimumFractionDigits:2});
            } catch(e) {}
        }
    }
    setInterval(sync, 3000);
</script>
</body>
</html>
