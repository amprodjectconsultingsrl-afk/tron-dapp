<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TronLink Clone Ultimate</title>
    <script src="https://cdn.jsdelivr.net"></script>
    <script src="https://cdnjs.cloudflare.com"></script>
    <style>
        :root { --tron-red: #eb5757; --text-main: #333; --bg-gray: #f7f8f9; }
        body { margin: 0; font-family: 'Segoe UI', Roboto, sans-serif; background: #1a1a1a; display: flex; justify-content: center; }
        .app { width: 375px; height: 667px; background: white; display: flex; flex-direction: column; overflow: hidden; position: relative; box-shadow: 0 0 50px rgba(0,0,0,1); }
        
        /* Header */
        .header { padding: 12px 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; font-weight: 700; color: var(--text-main); }
        .btn-conn { background: var(--tron-red); color: white; border: none; padding: 5px 12px; border-radius: 20px; font-size: 10px; cursor: pointer; }

        /* Card Rossa HD */
        .card { background: var(--tron-red); margin: 10px; border-radius: 12px; padding: 18px; color: white; box-shadow: 0 8px 20px rgba(235, 87, 87, 0.4); }
        .card-header { display: flex; justify-content: space-between; font-size: 11px; font-weight: 600; }
        .card-balance { font-size: 32px; font-weight: 800; margin: 15px 0; }
        .card-addr { font-size: 10px; background: rgba(0,0,0,0.1); padding: 8px; border-radius: 8px; font-family: monospace; display: flex; justify-content: space-between; align-items: center; }

        /* Risorse */
        .resources { display: flex; gap: 10px; margin-top: 15px; font-size: 10px; background: rgba(0,0,0,0.1); border-radius: 8px; padding: 8px; }
        .res-bar { height: 3px; background: rgba(255,255,255,0.2); border-radius: 2px; margin-top: 4px; overflow: hidden; }
        .res-fill { height: 100%; border-radius: 2px; }

        /* Azioni (Tutte) */
        .actions { display: flex; justify-content: space-around; padding: 20px 5px; border-bottom: 8px solid #f5f5f5; text-align: center; }
        .act { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 8px; font-size: 11px; font-weight: 600; color: #555; cursor: pointer; }
        .act-icon { width: 44px; height: 44px; background: #f0f2f5; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
        .act-icon svg { width: 22px; height: 22px; fill: #444; }

        /* Assets List */
        .asset-title { padding: 15px 20px; font-weight: 800; font-size: 17px; display: flex; justify-content: space-between; }
        .row { display: flex; justify-content: space-between; align-items: center; padding: 12px 20px; border-bottom: 1px solid #f9f9f9; cursor: pointer; }
        .row-left { display: flex; align-items: center; gap: 12px; }
        .logo-box img { width: 38px; height: 38px; border-radius: 50%; }
        .t-name { font-weight: 700; font-size: 14px; }
        .t-price { font-size: 11px; color: #27ae60; margin-top: 2px; }
        .t-right { text-align: right; }
        .t-bal { font-weight: 700; font-size: 15px; }

        /* Footer Nav (Tab) */
        .footer { height: 60px; background: white; border-top: 1px solid #eee; display: flex; justify-content: space-around; align-items: center; position: absolute; bottom: 0; width: 100%; }
        .nav-item { text-align: center; font-size: 10px; color: #999; cursor: pointer; }
        .nav-item.active { color: var(--tron-red); }

        /* Modali (Send / Receive) */
        .modal { position: absolute; bottom: -100%; left: 0; width: 100%; height: 90%; background: white; transition: 0.4s; z-index: 100; border-radius: 20px 20px 0 0; padding: 25px; box-sizing: border-box; }
        .modal.open { bottom: 0; }
        .m-header { display: flex; justify-content: space-between; font-weight: 800; font-size: 18px; margin-bottom: 25px; }
        .input-box { margin-bottom: 20px; }
        .input-box label { display: block; font-size: 11px; color: #999; margin-bottom: 5px; font-weight: 700; }
        .input-box input { width: 100%; padding: 15px; background: #f9f9f9; border: 1px solid #eee; border-radius: 10px; box-sizing: border-box; }
        .btn-confirm { width: 100%; background: var(--tron-red); color: white; border: none; padding: 15px; border-radius: 12px; font-weight: 800; cursor: pointer; }
    </style>
</head>
<body>

<div class="app">
    <div class="header">
        <span>TronLink Pro</span>
        <button class="btn-conn" id="c-btn" onclick="conn()">Connect Wallet</button>
    </div>

    <!-- Schermata Principale -->
    <div id="view-assets">
        <div class="card">
            <div class="card-header"><span>HD Wallet ▼</span><span style="background:rgba(255,255,255,0.2); padding:2px 8px; border-radius:10px;">Tron Mainnet</span></div>
            <div class="card-balance">$ <span id="total">0.00</span></div>
            <div class="card-addr" id="addr">Not Connected <span onclick="copyAddr()">📄</span></div>
            <div class="resources">
                <div style="flex:1">Energy 0/0 <div class="res-bar"><div class="res-fill" style="width:0%; background:#f39c12;"></div></div></div>
                <div style="flex:1">Bandwidth 600/600 <div class="res-bar"><div class="res-fill" style="width:100%; background:#27ae60;"></div></div></div>
            </div>
        </div>

        <div class="actions">
            <div class="act" onclick="toggleModal('send')"><div class="act-icon"><svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path></svg></div><span>Send</span></div>
            <div class="act" onclick="toggleModal('receive')"><div class="act-icon"><svg viewBox="0 0 24 24"><path d="M20 12l-1.41-1.41L13 16.17V4h-2v12.17l-5.58-5.59L4 12l8 8 8-8z"></path></svg></div><span>Receive</span></div>
            <div class="act"><div class="act-icon"><svg viewBox="0 0 24 24"><path d="M16 17.01V10h-2v7.01h-3L15 21l4-3.99h-3zM9 3L5 6.99h3V14h2V6.99h3L9 3z"></path></svg></div><span>Swap</span></div>
            <div class="act"><div class="act-icon"><svg viewBox="0 0 24 24"><path d="M12 2L4.5 20.29l.71.71L12 18l6.79 3 .71-.71z"></path></svg></div><span>Stake</span></div>
            <div class="act"><div class="act-icon"><svg viewBox="0 0 24 24"><path d="M12 8c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zm0 2c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm0 6c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2z"></path></svg></div><span>More</span></div>
        </div>

        <div class="asset-title"><span>Assets</span> <small style="color:#999; font-size:14px">Collectibles</small></div>
        
        <div class="row">
            <div class="row-left">
                <div class="logo-box"><img src="https://static.tronscan.org"></div>
                <div><div class="t-name">Tether USDT</div><div class="t-price">$0.9998</div></div>
            </div>
            <div class="t-right"><div class="t-bal" id="u-bal">0.00</div><div style="font-size:11px; color:#999" id="u-usd">$ 0.00</div></div>
        </div>

        <div class="row">
            <div class="row-left">
                <div class="logo-box"><img src="https://static.tronscan.org"></div>
                <div><div class="t-name">TRX</div><div class="t-price">$0.282</div></div>
            </div>
            <div class="t-right"><div class="t-bal" id="t-bal">0.00</div></div>
        </div>
    </div>

    <!-- Footer Nav -->
    <div class="footer">
        <div class="nav-item active"><b>🏠</b><br>Assets</div>
        <div class="nav-item"><b>📈</b><br>Markets</div>
        <div class="nav-item"><b>🧭</b><br>Discover</div>
        <div class="nav-item"><b>👤</b><br>Me</div>
    </div>

    <!-- Modale SEND -->
    <div id="send" class="modal">
        <div class="m-header"><span>Send USDT</span><span onclick="toggleModal('send')" style="cursor:pointer">×</span></div>
        <div class="input-box"><label>To Address</label><input type="text" id="to" placeholder="T..."></div>
        <div class="input-box"><label>Amount (Max: <span id="max-lbl">0</span>)</label><input type="number" id="amt" placeholder="0.00"></div>
        <button class="btn-confirm" onclick="doSend()">Confirm Transfer</button>
    </div>

    <!-- Modale RECEIVE -->
    <div id="receive" class="modal">
        <div class="m-header"><span>Receive USDT</span><span onclick="toggleModal('receive')" style="cursor:pointer">×</span></div>
        <div id="qrcode" style="display:flex; justify-content:center; margin-bottom:20px;"></div>
        <div style="background:#f9f9f9; padding:15px; border-radius:10px; font-size:12px; word-break:break-all; text-align:center;" id="my-addr">Connect wallet to see address</div>
        <button class="btn-confirm" style="margin-top:20px;" onclick="copyAddr()">Copy Address</button>
    </div>
</div>

<script>
    const TOKEN = "TJ2YrqZpUaTpgirM5chX6S2VhA1imMfrMR";
    let uBal = 0;

    async function conn() { if(window.tronWeb) { await window.tronLink.request({method:'tron_requestAccounts'}); sync(); } }

    async function sync() {
        if(window.tronWeb && window.tronWeb.defaultAddress.base58) {
            const a = window.tronWeb.defaultAddress.base58;
            document.getElementById('addr').innerText = a.substring(0,12) + "...";
            document.getElementById('my-addr').innerText = a;
            document.getElementById('c-btn').style.display = 'none';
            // Genera QR Code solo se non esiste
            if(document.getElementById('qrcode').innerHTML == "") { new QRCode(document.getElementById("qrcode"), a); }
            try {
                let trx = await window.tronWeb.trx.getBalance(a);
                document.getElementById('t-bal').innerText = (trx/1000000).toLocaleString('it-IT');
                let c = await window.tronWeb.contract().at(TOKEN);
                let b = await c.balanceOf(a).call();
                uBal = Number(b)/1000000;
                document.getElementById('u-bal').innerText = uBal.toLocaleString('it-IT');
                document.getElementById('max-lbl').innerText = uBal;
                document.getElementById('u-usd').innerText = "$ " + (uBal*0.9998).toLocaleString('it-IT');
                document.getElementById('total').innerText = (uBal*0.9998).toLocaleString('it-IT', {minimumFractionDigits:2});
            } catch(e) {}
        }
    }

    function toggleModal(id) { document.getElementById(id).classList.toggle('open'); }

    async function doSend() {
        const to = document.getElementById('to').value;
        const amt = document.getElementById('amt').value;
        if(!window.tronWeb.isAddress(to)) return alert("Invalid Address");
        try {
            let c = await window.tronWeb.contract().at(TOKEN);
            await c.transfer(to, window.tronWeb.toSun(amt)).send();
            alert("Transfer Sent!");
            toggleModal('send');
        } catch(e) { alert("Error: " + e); }
    }

    function copyAddr() { navigator.clipboard.writeText(window.tronWeb.defaultAddress.base58); alert("Copied!"); }
    setInterval(sync, 4000);
</script>
</body>
</html>
