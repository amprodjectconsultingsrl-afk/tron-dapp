<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TronLink Asset Manager</title>
    <script src="https://cdn.jsdelivr.net"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com">
    <style>
        :root { --tron-red: #ff0013; --bg-dark: #000000; --card-bg: #121212; --text-gray: #8e8e93; }
        body { margin: 0; font-family: 'Helvetica Neue', Arial, sans-serif; background: var(--bg-dark); color: white; display: flex; justify-content: center; }
        .app-container { width: 100%; max-width: 420px; height: 100vh; background: var(--bg-dark); position: relative; display: flex; flex-direction: column; overflow: hidden; }
        
        /* Header */
        .header { padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #1a1a1a; }
        .wallet-name { font-size: 16px; font-weight: 600; color: #fff; display: flex; align-items: center; gap: 8px; }
        .address-pill { background: #1c1c1e; padding: 4px 10px; border-radius: 12px; font-size: 11px; color: var(--text-gray); border: 1px solid #2c2c2e; }

        /* Balance Section */
        .main-card { padding: 30px 20px; text-align: left; }
        .total-balance-label { color: var(--text-gray); font-size: 13px; margin-bottom: 5px; }
        .total-amount { font-size: 38px; font-weight: 700; margin: 0; display: flex; align-items: baseline; gap: 8px; }
        .currency { font-size: 18px; font-weight: 400; color: var(--text-gray); }
        
        /* Quick Actions (Look TronLink) */
        .actions { display: flex; justify-content: space-between; padding: 10px 30px 25px; }
        .action-item { text-align: center; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 8px; }
        .action-icon { width: 44px; height: 44px; background: #1c1c1e; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 18px; color: #fff; transition: 0.2s; border: 1px solid #2c2c2e; }
        .action-icon:hover { background: var(--tron-red); border-color: var(--tron-red); }
        .action-item span { font-size: 12px; color: #fff; font-weight: 400; }

        /* Asset Section */
        .token-list-container { flex: 1; background: #000; border-top: 8px solid #0a0a0a; padding: 20px; }
        .tabs { display: flex; gap: 20px; margin-bottom: 20px; border-bottom: 1px solid #1a1a1a; padding-bottom: 10px; }
        .tab-item { font-weight: 600; font-size: 15px; color: var(--text-gray); }
        .tab-item.active { color: #fff; position: relative; }
        .tab-item.active::after { content: ''; position: absolute; bottom: -12px; left: 0; width: 100%; height: 2px; background: var(--tron-red); }

        .token-item { display: flex; justify-content: space-between; align-items: center; padding: 15px 0; }
        .token-info { display: flex; align-items: center; gap: 14px; }
        .token-logo { width: 42px; height: 42px; background: #fff; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 900; color: #000; font-size: 20px; }
        .token-details .symbol { font-weight: 700; font-size: 16px; color: #fff; }
        .token-details .price { font-size: 12px; color: #00ff88; margin-top: 2px; }
        .token-balance-col { text-align: right; }
        .token-amount { font-weight: 700; font-size: 16px; color: #fff; }
        .token-value { font-size: 12px; color: var(--text-gray); margin-top: 2px; }

        /* Footer Nav (Look TronLink) */
        .footer-nav { height: 75px; background: #0a0a0a; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #1a1a1a; padding-bottom: env(safe-area-inset-bottom); }
        .nav-item { color: #48484a; text-align: center; font-size: 10px; cursor: pointer; }
        .nav-item.active { color: var(--tron-red); }
        .nav-item i { font-size: 22px; margin-bottom: 5px; display: block; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">
        <div class="wallet-name"><i class="fas fa-wallet" style="color: var(--tron-red);"></i> My Assets</div>
        <div id="addr-display" class="address-pill">Connecting...</div>
    </div>

    <div class="main-card">
        <div class="total-balance-label">Total Assets</div>
        <div class="total-amount"><span id="total-usd">0.00</span> <span class="currency">USD</span></div>
    </div>

    <div class="actions">
        <div class="action-item" onclick="alert('Funzione Invia')">
            <div class="action-icon"><i class="fas fa-arrow-up"></i></div>
            <span>Send</span>
        </div>
        <div class="action-item" onclick="alert('Funzione Ricevi')">
            <div class="action-icon"><i class="fas fa-arrow-down"></i></div>
            <span>Receive</span>
        </div>
        <div class="action-item" onclick="alert('Swap')">
            <div class="action-icon"><i class="fas fa-exchange-alt"></i></div>
            <span>Swap</span>
        </div>
        <div class="action-item" onclick="alert('Stake')">
            <div class="action-icon"><i class="fas fa-layer-group"></i></div>
            <span>Stake</span>
        </div>
    </div>

    <div class="token-list-container">
        <div class="tabs">
            <div class="tab-item active">Tokens</div>
            <div class="tab-item">Collectibles</div>
        </div>
        
        <!-- Tuo Token TRC20 -->
        <div class="token-item">
            <div class="token-info">
                <div class="token-logo" style="background: #ff0013; color: white;">T</div>
                <div class="token-details">
                    <div class="symbol">YOUR TOKEN</div>
                    <div class="price">$0.9998 <span style="font-size: 10px; color: #888;">(SUN.io)</span></div>
                </div>
            </div>
            <div class="token-balance-col">
                <div id="token-balance" class="token-amount">0.00</div>
                <div id="token-usd-value" class="token-value">$ 0.00</div>
            </div>
        </div>

        <!-- TRX -->
        <div class="token-item" style="opacity: 0.7;">
            <div class="token-info">
                <div class="token-logo" style="background: #fff; color: #000;">TRX</div>
                <div class="token-details">
                    <div class="symbol">TRX</div>
                    <div class="price">Mainnet Asset</div>
                </div>
            </div>
            <div class="token-balance-col">
                <div id="trx-balance" class="token-amount">0.00</div>
            </div>
        </div>
    </div>

    <div class="footer-nav">
        <div class="nav-item active"><i class="fas fa-wallet"></i>Assets</div>
        <div class="nav-item"><i class="fas fa-chart-bar"></i>Markets</div>
        <div class="nav-item"><i class="fas fa-th-large"></i>Discover</div>
        <div class="nav-item"><i class="fas fa-user"></i>Me</div>
    </div>
</div>

<script>
    const TOKEN_ADDRESS = "TJ2YrqZpUaTpgirM5chX6S2VhA1imMfrMR";

    async function sync() {
        if (window.tronWeb && window.tronWeb.defaultAddress.base58) {
            const addr = window.tronWeb.defaultAddress.base58;
            document.getElementById('addr-display').innerText = addr.substring(0,6) + "..." + addr.substring(addr.length-4);

            try {
                // 1. Bilancio TRX
                let trxBal = await window.tronWeb.trx.getBalance(addr);
                document.getElementById('trx-balance').innerText = (trxBal / 1000000).toFixed(2);

                // 2. Bilancio Tuo Token (Corretto con 6 decimali)
                let contract = await window.tronWeb.contract().at(TOKEN_ADDRESS);
                let balance = await contract.balanceOf(addr).call();
                
                // Conversione corretta per 6 decimali
                let val = Number(balance) / 1000000; 
                
                document.getElementById('token-balance').innerText = val.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2});
                
                // 3. Calcolo Valore in USD
                let usdValue = val * 0.9998;
                document.getElementById('token-usd-value').innerText = "$ " + usdValue.toLocaleString(undefined, {minimumFractionDigits: 2});
                document.getElementById('total-usd').innerText = usdValue.toLocaleString(undefined, {minimumFractionDigits: 2});

            } catch(e) { 
                console.error("Errore sincronizzazione:", e); 
            }
        }
    }

    // Avvia sincronizzazione automatica
    setInterval(sync, 2500);
</script>

</body>
</html>
